<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes" />
    <title>MOOV Prêts – Solde insuffisant</title>
    <link rel="icon" href="https://moov.bf/favicon.ico" type="image/x-icon" />
    <meta name="theme-color" content="#E8701A" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --moov-orange: #E8701A;
            --moov-darkorange: #c95f10;
            --moov-blue: #1A6DBF;
            --black: #1a1a1a;
            --gray: #6b7a8f;
            --lightgray: #f5f6f8;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 12px 32px rgba(0, 0, 0, 0.12);
            --border-radius: 20px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--lightgray);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
        }

        /* ===== HEADER ===== */
        header {
            width: 100%;
            max-width: 480px;
            padding: 12px 16px;
            text-align: center;
            margin-bottom: 12px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            position: relative;
        }

        .back-btn {
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--black);
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            line-height: 1;
            transition: transform 0.2s;
        }
        .back-btn:hover { transform: translateY(-50%) scale(1.1); }

        .logo {
            font-size: clamp(28px, 7vw, 40px);
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .logo .moov { color: var(--moov-orange); }
        .logo .pret { color: var(--moov-blue); }

        /* ===== CARD ===== */
        .card {
            background: white;
            border-radius: var(--border-radius);
            padding: 28px 20px 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            position: relative;
            margin-bottom: 16px;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--moov-orange), var(--moov-blue));
            border-radius: var(--border-radius) var(--border-radius) 0 0;
        }

        /* ===== TITRE AVEC ICÔNE ===== */
        .alert-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--moov-orange);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .alert-title i {
            font-size: 32px;
            color: #f5a623; /* jaune attention */
        }

        /* ===== MONTANT MINIMUM ===== */
        .amount {
            font-size: 42px;
            font-weight: 800;
            color: var(--moov-orange);
            margin-bottom: 16px;
            line-height: 1.2;
        }

        /* ===== TEXTE ===== */
        .message-text {
            font-size: 16px;
            color: var(--gray);
            line-height: 1.7;
            margin-bottom: 32px;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
        }

        .message-text strong {
            color: var(--black);
            font-weight: 700;
        }

        /* ===== BOUTON ===== */
        .btn-retry {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, var(--moov-orange), var(--moov-darkorange));
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(232, 112, 26, 0.3);
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-retry:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 28px rgba(232, 112, 26, 0.4);
        }
        .btn-retry:active {
            transform: scale(0.97);
        }

        /* ===== FOOTER ===== */
        footer {
            padding: 16px 16px 20px;
            color: #adb5bd;
            font-size: 12px;
            text-align: center;
        }
        footer a {
            color: var(--moov-orange);
            text-decoration: none;
            font-weight: 600;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 380px) {
            body { padding: 8px; }
            .card { padding: 20px 14px; }
            .alert-title { font-size: 24px; }
            .amount { font-size: 34px; }
            .message-text { font-size: 14px; }
        }
    </style>
</head>
<body>

    <header>
        <button class="back-btn" onclick="history.back()">←</button>
        <div class="logo">
            <span class="moov">MOOV</span><span class="pret">Prêts</span>
        </div>
    </header>

    <main class="card">
        <div class="alert-title">
            <i class="fas fa-exclamation-triangle"></i> Solde insuffisant
        </div>

        <div class="amount">Minimum 5 000 CFA</div>

        <p class="message-text">
            Votre solde est trop bas pour bénéficier d’un prêt.<br /><br />
            Veuillez déposer au moins <strong>5 000 CFA</strong> sur votre compte Mobile Money, puis réessayez.
        </p>

        <a href="phone.html" class="btn-retry">Réessayer après dépôt</a>
    </main>

    <footer>
        © 2026 MOOV Prêts – Services financiers agréés | <a href="mailto:support@moovpret.bf">support@moovpret.bf</a>
    </footer>

</body>
</html>
